    <script>
      // Load and replace the DOM with the correct index.html based on the path
      (function () {
        const path = window.location.pathname;
        const ghBase = "/hedwig-design-system/";
        const baseUrl = path.startsWith(ghBase) ? ghBase : "/";

        // Determine which index.html to load
        const isV3 = path.includes("examples-v3");
        const indexPath = isV3
          ? baseUrl + "examples-v3/index.html"
          : baseUrl + "examples/index.html";

        // Fetch and replace the entire document
        fetch(indexPath)
          .then((response) => response.text())
          .then((html) => {
            const normalizedHtml = baseUrl === "/" ? html.replaceAll(ghBase, "/") : html;

            document.open();
            document.write(normalizedHtml);
            document.close();
          })
          .catch((error) => {
            console.error("Error loading page:", error);
            document.body.innerHTML = "<p>Error loading page. Please try again.</p>";
          });
      })();
    </script>
